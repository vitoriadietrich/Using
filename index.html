<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Neumorphic Keyboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="keyboard-container neu-raised">
        <ul class="keyboard">
            <li class="key neu-raised" data-key="q">Q</li>
            <li class="key neu-raised" data-key="w">W</li>
            <li class="key neu-raised" data-key="e">E</li>
            <li class="key neu-raised" data-key="r">R</li>
            <li class="key neu-raised" data-key="t">T</li>
            <li class="key neu-raised" data-key="y">Y</li>
            <li class="key neu-raised" data-key="u">U</li>
            <li class="key neu-raised" data-key="i">I</li>
            <li class="key neu-raised" data-key="o">O</li>
            <li class="key neu-raised" data-key="p">P</li>
            
            <li class="key neu-raised" data-key="a">A</li>
            <li class="key neu-raised" data-key="s">S</li>
            <li class="key neu-raised" data-key="d">D</li>
            <li class="key neu-raised" data-key="f">F</li>
            <li class="key neu-raised" data-key="g">G</li>
            <li class="key neu-raised" data-key="h">H</li>
            <li class="key neu-raised" data-key="j">J</li>
            <li class="key neu-raised" data-key="k">K</li>
            <li class="key neu-raised" data-key="l">L</li>
            
            <li class="key neu-raised" data-key="z">Z</li>
            <li class="key neu-raised" data-key="x">X</li>
            <li class="key neu-raised" data-key="c">C</li>
            <li class="key neu-raised" data-key="v">V</li>
            <li class="key neu-raised" data-key="b">B</li>
            <li class="key neu-raised" data-key="n">N</li>
            <li class="key neu-raised" data-key="m">M</li>
            
            <li class="key neu-raised space" data-key=" ">SPACE</li>
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
